<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Fashion Store</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, sans-serif;
        }

        body{
            background:#f5f5f5;
        }

        header{
            background:black;
            color:white;
            padding:20px;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        header h1{
            font-size:30px;
        }

        nav a{
            color:white;
            text-decoration:none;
            margin:0 15px;
            font-size:18px;
        }

        .hero{
            height:500px;
            background:url('https://images.unsplash.com/photo-1445205170230-053b83016050?q=80&w=1200') center/cover;
            display:flex;
            justify-content:center;
            align-items:center;
            color:white;
            text-align:center;
        }

        .hero-content{
            background:rgba(0,0,0,0.5);
            padding:40px;
            border-radius:10px;
        }

        .hero h2{
            font-size:50px;
            margin-bottom:20px;
        }

        .hero p{
            font-size:20px;
            margin-bottom:20px;
        }

        .btn{
            padding:12px 25px;
            background:#ff4d4d;
            color:white;
            text-decoration:none;
            border-radius:5px;
            font-size:18px;
        }

        .products{
            padding:50px 10%;
        }

        .products h2{
            text-align:center;
            margin-bottom:40px;
            font-size:40px;
        }

        .product-grid{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
            gap:30px;
        }

        .product-card{
            background:white;
            border-radius:10px;
            overflow:hidden;
            box-shadow:0 5px 15px rgba(0,0,0,0.1);
            transition:0.3s;
        }

        .product-card:hover{
            transform:translateY(-10px);
        }

        .product-card img{
            width:100%;
            height:300px;
            object-fit:cover;
        }

        .product-info{
            padding:20px;
            text-align:center;
        }

        .product-info h3{
            margin-bottom:10px;
        }

        .price{
            color:#ff4d4d;
            font-size:22px;
            margin-bottom:15px;
        }

        .buy-btn{
            background:black;
            color:white;
            padding:10px 20px;
            border:none;
            cursor:pointer;
            border-radius:5px;
        }

        footer{
            background:black;
            color:white;
            text-align:center;
            padding:20px;
            margin-top:50px;
        }
    </style>
</head>

<body>

    <header>
        <h1>FashionHub</h1>

        <nav>
            <a href="#">Home</a>
            <a href="#">Men</a>
            <a href="#">Women</a>
            <a href="#">Collections</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    <section class="hero">
        <div class="hero-content">
            <h2>New Fashion Collection 2026</h2>
            <p>Trendy outfits for every season</p>
            <a href="#" class="btn">Shop Now</a>
        </div>
    </section>

    <section class="products">

        <h2>Featured Products</h2>

        <div class="product-grid">

            <div class="product-card">
                <img src="https://images.unsplash.com/photo-1521572267360-ee0c2909d518?q=80&w=1000" alt="">
                <div class="product-info">
                    <h3>Casual T-Shirt</h3>
                    <p class="price">$29</p>
                    <button class="buy-btn">Add to Cart</button>
                </div>
            </div>

            <div class="product-card">
                <img src="https://images.unsplash.com/photo-1541099649105-f69ad21f3246?q=80&w=1000" alt="">
                <div class="product-info">
                    <h3>Stylish Jacket</h3>
                    <p class="price">$89</p>
                    <button class="buy-btn">Add to Cart</button>
                </div>
            </div>

            <div class="product-card">
                <img src="https://images.unsplash.com/photo-1529139574466-a303027c1d8b?q=80&w=1000" alt="">
                <div class="product-info">
                    <h3>Women Fashion Dress</h3>
                    <p class="price">$59</p>
                    <button class="buy-btn">Add to Cart</button>
                </div>
            </div>

            <div class="product-card">
                <img src="https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?q=80&w=1000" alt="">
                <div class="product-info">
                    <h3>Modern Sneakers</h3>
                    <p class="price">$120</p>
                    <button class="buy-btn">Add to Cart</button>
                </div>
            </div>

        </div>

    </section>

    <footer>
        <p>© 2026 FashionHub | All Rights Reserved</p>
    </footer>

</body>
</html>
