<!DOCTYPE html>
<html>
<head>

    <title>FashionHub</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<h1>FashionHub Products</h1>

<div id="products"></div>

<script>

fetch('/api/products')
.then(res => res.json())
.then(data => {

    let output = '';

    data.forEach(product => {

        output += `

        <div class="card">

            <img src="${product.image}" width="250">

            <h2>${product.name}</h2>

            <p>${product.description}</p>

            <h3>₹${product.price}</h3>

            <button>Add to Cart</button>

        </div>

        `;

    });

    document.getElementById('products').innerHTML = output;

});

</script>

</body>
</html>
