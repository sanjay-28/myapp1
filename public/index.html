<!DOCTYPE html>
<html>
<head>

<title>VibeThread Fashion</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<section class="hero">

    <h1>Fashion That Defines You</h1>

    <p>Explore premium streetwear, fusion fashion & futuristic drops</p>

    <button>Shop Now</button>

</section>

<h1 class="section-title">Trending Products</h1>

<div id="products"></div>



<h1>VibeThread</h1>

<nav>
<a href="#">Men</a>
<a href="#">Women</a>
<a href="#">Kids</a>
<a href="#">Shoes</a>
</nav>

</header>

<h2 class="title">Trending Products</h2>

<div id="products"></div>

<script>

fetch('/api/products')
.then(res => res.json())
.then(data => {

    let output = '';

    data.forEach(product => {

        output += `

        <div class="card">

            <img src="${product.image}">

            <span class="category">${product.category}</span>

            <h2>${product.name}</h2>

            <p>${product.description}</p>

            <h3>₹${product.price}</h3>

            <button>Add to Bag</button>

        </div>

        `;

    });

    document.getElementById('products').innerHTML = output;

});

</script>

</body>
</html>
